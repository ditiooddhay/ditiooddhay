<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{ color-scheme: dark;--gold:#c9a84c;--gold-light:#e8c96d;--dark:#0e0c0a;--dark2:#1a1714;--dark3:#211e18;--cream:#f5efe6;--text-muted:#9a8f7e}
html{scroll-behavior:smooth}
body{background:var(--dark);color:var(--cream);font-family:'Hind Siliguri',sans-serif;min-height:100vh}

/* PAGE LOADER */
#pageLoader{position:fixed;inset:0;z-index:9999;background:#0e0c0a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.2rem;transition:opacity .5s ease,visibility .5s ease}
#pageLoader.hide{opacity:0;visibility:hidden;pointer-events:none}
.loader-logo{width:90px;height:auto;filter:drop-shadow(0 0 20px rgba(201,168,76,.4));animation:loaderPulse 1.5s ease-in-out infinite}
@keyframes loaderPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.loader-bar-wrap{width:120px;height:2px;background:rgba(201,168,76,.15);overflow:hidden}
.loader-bar{height:100%;background:linear-gradient(90deg,transparent,#c9a84c,transparent);animation:loaderBar 1.2s ease-in-out infinite;width:60%}
@keyframes loaderBar{0%{transform:translateX(-100%)}100%{transform:translateX(280%)}}
.loader-text{font-size:.7rem;letter-spacing:3px;text-transform:uppercase;color:rgba(201,168,76,.5)}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(14,12,10,.96);backdrop-filter:blur(12px);border-bottom:1px solid rgba(201,168,76,.12);padding:.85rem 1.5rem;display:flex;align-items:center}
.nav-logo{width:38px;height:auto;filter:drop-shadow(0 0 8px rgba(201,168,76,.3));cursor:pointer;flex-shrink:0}
.nav-title{font-family:'Playfair Display',serif;font-size:1rem;color:var(--gold);letter-spacing:.5px;position:absolute;left:50%;transform:translateX(-50%);white-space:nowrap}
.nav-back{display:inline-flex;align-items:center;gap:.4rem;color:var(--text-muted);text-decoration:none;font-size:.72rem;letter-spacing:1.5px;text-transform:uppercase;border:1px solid rgba(201,168,76,.2);padding:.38rem .9rem;transition:all .25s;background:rgba(255,255,255,.02);margin-left:auto;flex-shrink:0}
.nav-back:hover{color:var(--gold);border-color:rgba(201,168,76,.5);background:rgba(201,168,76,.06)}

/* PAGE HERO */
.page-hero{padding:7rem 2rem 3rem;text-align:center;background:radial-gradient(ellipse at 50% 0%,rgba(201,168,76,.1) 0%,transparent 70%);border-bottom:1px solid rgba(201,168,76,.1)}
.page-badge{display:inline-block;font-size:.65rem;letter-spacing:4px;text-transform:uppercase;color:var(--gold);border:1px solid rgba(201,168,76,.35);padding:5px 18px;margin-bottom:1rem}
.page-title{font-family:'Playfair Display',serif;font-size:clamp(2rem,5vw,3rem);color:var(--cream)}
.page-title em{color:var(--gold);font-style:italic}
.divider{display:flex;align-items:center;gap:1rem;justify-content:center;margin:1rem 0}
.dl{width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--gold))}
.dr{background:linear-gradient(270deg,transparent,var(--gold))}
.dd{width:5px;height:5px;background:var(--gold);transform:rotate(45deg)}

/* FOUNDER */
.section{max-width:1000px;margin:0 auto;padding:2rem 1.5rem}
.section-label{font-size:.68rem;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:1.5rem;display:flex;align-items:center;gap:1rem}
.section-label::after{content:'';flex:1;height:1px;background:rgba(201,168,76,.2)}
.founder-card{background:var(--dark2);border:1px solid rgba(201,168,76,.2);padding:2rem;display:flex;gap:2rem;align-items:flex-start;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
.founder-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.founder-card:hover{border-color:rgba(201,168,76,.5);transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,0,0,.4)}
.founder-photo{width:110px;height:110px;border-radius:50%;overflow:hidden;border:3px solid var(--gold);flex-shrink:0;background:var(--dark3);display:flex;align-items:center;justify-content:center;font-size:3rem}
.founder-photo img{width:100%;height:100%;object-fit:cover}
.founder-info{flex:1}
.founder-badge{font-size:.62rem;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:.5rem}
.founder-name{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--cream);margin-bottom:.4rem}
.founder-role{font-size:.78rem;color:var(--text-muted);letter-spacing:1px;margin-bottom:.6rem}
.founder-bio{font-size:.88rem;color:var(--text-muted);line-height:1.8}
.view-profile-hint{font-size:.68rem;color:rgba(201,168,76,.6);margin-top:.8rem;letter-spacing:1px}
@media(max-width:600px){.founder-card{flex-direction:column;align-items:center;text-align:center}}

/* TEAM GRID */
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1.2rem;margin-bottom:4rem}
.member-card{background:var(--dark2);border:1px solid rgba(201,168,76,.12);overflow:hidden;cursor:pointer;transition:all .3s;animation:fadeUp .5s ease both;position:relative}
.member-card::after{content:'প্রোফাইল ↗';position:absolute;bottom:0;left:0;right:0;background:rgba(201,168,76,.9);color:var(--dark);font-size:.65rem;letter-spacing:1px;text-align:center;padding:.3rem;transform:translateY(100%);transition:transform .25s;font-weight:700}
.member-card:hover{border-color:rgba(201,168,76,.4);transform:translateY(-3px);box-shadow:0 10px 30px rgba(0,0,0,.4)}
.member-card:hover::after{transform:translateY(0)}
.member-photo{width:100%;aspect-ratio:1;background:var(--dark3);display:flex;align-items:center;justify-content:center;font-size:3rem;overflow:hidden}
.member-photo img{width:100%;height:100%;object-fit:cover}
.member-info{padding:.8rem;text-align:center}
.member-name{font-family:'Playfair Display',serif;font-size:.9rem;color:var(--cream)}
.member-role{font-size:.65rem;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-top:.2rem}

/* PROFILE MODAL */
.modal-overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.9);align-items:center;justify-content:center;padding:1rem}
.modal-overlay.open{display:flex;animation:fadeIn .3s ease}
.modal-box{background:var(--dark2);border:1px solid rgba(201,168,76,.2);width:100%;max-width:520px;max-height:92vh;overflow-y:auto;position:relative;animation:slideUp .35s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.modal-close{position:absolute;top:1rem;right:1rem;z-index:10;background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.1);color:var(--cream);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;transition:all .25s}
.modal-close:hover{background:rgba(201,168,76,.2);border-color:var(--gold);color:var(--gold)}
.modal-cover{width:100%;height:180px;background:linear-gradient(135deg,var(--dark3),#2a2420);display:flex;align-items:center;justify-content:center;font-size:4rem;overflow:hidden;position:relative}
.modal-cover img{width:100%;height:100%;object-fit:cover;opacity:.6}
.modal-avatar-wrap{padding:0 1.5rem;position:relative;margin-top:-45px;margin-bottom:.5rem}
.modal-avatar{width:90px;height:90px;border-radius:50%;border:3px solid var(--gold);object-fit:cover;background:var(--dark3);display:block}
.modal-avatar-placeholder{width:90px;height:90px;border-radius:50%;border:3px solid var(--gold);background:var(--dark3);display:flex;align-items:center;justify-content:center;font-size:2.5rem}
.modal-body{padding:.5rem 1.5rem 1.5rem}
.modal-name{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--cream);margin-bottom:.2rem}
.modal-role{font-size:.68rem;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:1.2rem}
.modal-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;margin-bottom:1.5rem}
.stat-box{background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.15);padding:.8rem .5rem;text-align:center}
.stat-num{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--gold);line-height:1}
.stat-lbl{font-size:.58rem;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);margin-top:.2rem}
.modal-section{margin-bottom:1.2rem}
.modal-section-title{font-size:.62rem;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:.5rem;padding-bottom:.3rem;border-bottom:1px solid rgba(201,168,76,.1)}
.modal-section-text{font-size:.88rem;color:var(--text-muted);line-height:1.8}

/* SPINNER */
.spinner{width:28px;height:28px;border:3px solid rgba(201,168,76,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:3rem auto}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}

footer{background:var(--dark2);border-top:1px solid rgba(201,168,76,.12);padding:1.5rem 2rem;text-align:center;color:var(--text-muted);font-size:.82rem}
footer span{color:var(--gold)}
</style>
</head>

  <h1 class="page-title">আমাদের <em>টিম</em></h1>
  <div class="divider"><div class="dl"></div><div class="dd"></div><div class="dl dr"></div></div>
</div>

<div class="section">
  <div class="section-label">প্রতিষ্ঠাতা</div>
  <div id="founderSection"><div class="spinner"></div></div>

  <div class="section-label" style="margin-top:2.5rem">আমাদের ফটোগ্রাফার ও সিনেমাটোগ্রাফার</div>
  <div class="team-grid" id="teamGrid"><div class="spinner"></div></div>
</div>

<footer><p>&#169; ২০১৯ <span>দ্বিতীয় অধ্যায়</span> · ওয়েডিং ফটোগ্রাফি · পঞ্চগড়</p></footer>

<!-- PROFILE MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal-box" id="modalBox">
    <button class="modal-close" onclick="closeModal()">&#10005;</button>
    <div id="modalContent"></div>
  </div>
</div>

<script>
const SB = supabase.createClient(
  'https://cqymtragfzyphgwfodbh.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNxeW10cmFnZnp5cGhnd2ZvZGJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzMDgxNzQsImV4cCI6MjA5Mzg4NDE3NH0.Jkeyi-hA02od9fCzAPMFHzX5ZwdYgLjLjEQB5F12NZU'
);

// ── LOAD TEAM ──
async function loadTeam() {
  try {
    // Founder
    const { data: founders } = await SB.from('team_founder').select('*').limit(1);
    const founderEl = document.getElementById('founderSection');
    if (founders && founders[0]) {
      const f = founders[0];
      founderEl.innerHTML = buildFounderCard(f);
    } else {
      founderEl.innerHTML = '<p style="color:var(--text-muted)">তথ্য যোগ করা হয়নি।</p>';
    }

    // Members
    const { data: members } = await SB.from('team_members').select('*').order('created_at', {ascending:true});
    const gridEl = document.getElementById('teamGrid');
    if (!members || members.length === 0) {
      gridEl.innerHTML = '<p style="color:var(--text-muted)">কোনো মেম্বার নেই।</p>';
      return;
    }
    gridEl.innerHTML = members.map((m, i) => buildMemberCard(m, i)).join('');
  } catch(e) {
    document.getElementById('founderSection').innerHTML = 
      '<p style="color:var(--text-muted)">লোড হয়নি। <button onclick="loadTeam()" style="background:none;border:none;color:var(--gold);cursor:pointer;text-decoration:underline;font-family:Hind Siliguri,sans-serif">আবার চেষ্টা করুন</button></p>';
    console.error(e);
  }
}

function buildFounderCard(f) {
  const id = 'founder_' + (f.id || 0);
  window._profileData = window._profileData || {};
  window._profileData[id] = f;
  return `
    <div class="founder-card" onclick="openProfile('${id}')">
      <div class="founder-photo">
        ${f.photo_url ? `<img src="${f.photo_url}" alt="${f.name}">` : '&#128100;'}
      </div>
      <div class="founder-info">
        <div class="founder-badge">প্রতিষ্ঠাতা ও সিইও</div>
        <div class="founder-name">${f.name || ''}</div>
        <div class="founder-role">${f.role || ''}</div>
        <div class="founder-bio">${f.bio || ''}</div>
        <div class="view-profile-hint">বিস্তারিত প্রোফাইল দেখুন ↗</div>
      </div>
    </div>`;
}

function buildMemberCard(m, i) {
  const id = 'member_' + (m.id || i);
  window._profileData = window._profileData || {};
  window._profileData[id] = m;
  return `
    <div class="member-card" style="animation-delay:${i*.07}s" onclick="openProfile('${id}')">
      <div class="member-photo">
        ${m.photo_url ? `<img src="${m.photo_url}" alt="${m.name}">` : '&#128100;'}
      </div>
      <div class="member-info">
        <div class="member-name">${m.name || ''}</div>
        <div class="member-role">${m.role || ''}</div>
      </div>
    </div>`;
}

// ── PROFILE MODAL ──
function openProfile(id) {
  const m = window._profileData[id];
  if (!m) return;

  const currentYear = new Date().getFullYear();
  const joinedYear = m.joined_year || m.founded_year || 2019;
  const yearsWithUs = currentYear - joinedYear;
  const events = m.events_covered || 0;
  const specialty = m.specialty || m.role || '—';

  document.getElementById('modalContent').innerHTML = `
    <div class="modal-cover">
      ${m.photo_url ? `<img src="${m.photo_url}" alt="${m.name}">` : '&#128247;'}
    </div>
    <div class="modal-avatar-wrap">
      ${m.photo_url 
        ? `<img class="modal-avatar" src="${m.photo_url}" alt="${m.name}">`
        : `<div class="modal-avatar-placeholder">&#128100;</div>`}
    </div>
    <div class="modal-body">
      <div class="modal-name">${m.name || ''}</div>
      <div class="modal-role">${m.role || 'দ্বিতীয় অধ্যায়'}</div>

      <div class="modal-stats">
        <div class="stat-box">
          <div class="stat-num">${yearsWithUs}+</div>
          <div class="stat-lbl">বছর</div>
        </div>
        <div class="stat-box">
          <div class="stat-num">${events > 0 ? events + '+' : '—'}</div>
          <div class="stat-lbl">ইভেন্ট</div>
        </div>
        <div class="stat-box">
          <div class="stat-num">&#11088;5</div>
          <div class="stat-lbl">রেটিং</div>
        </div>
      </div>

      ${m.bio ? `
      <div class="modal-section">
        <div class="modal-section-title">পরিচিতি</div>
        <div class="modal-section-text">${m.bio}</div>
      </div>` : ''}

      <div class="modal-section">
        <div class="modal-section-title">বিশেষত্ব</div>
        <div class="modal-section-text">${specialty}</div>
      </div>

      <div class="modal-section">
        <div class="modal-section-title">দ্বিতীয় অধ্যায়ের সাথে</div>
        <div class="modal-section-text">${joinedYear} সাল থেকে দ্বিতীয় অধ্যায়ের সাথে আছেন — ${yearsWithUs} বছরের বিশ্বস্ত সঙ্গী।</div>
      </div>

      ${m.future_plan ? `
      <div class="modal-section">
        <div class="modal-section-title">আগামীর পরিকল্পনা</div>
        <div class="modal-section-text">${m.future_plan}</div>
      </div>` : ''}
    </div>`;

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

// Escape key
document.addEventListener('keydown', e => { if(e.key === 'Escape') closeModal(); });

// Page loader
function hideLoader() {
  var l = document.getElementById('pageLoader');
  if (l) l.classList.add('hide');
}
window.addEventListener('load', function() { setTimeout(hideLoader, 400); });
setTimeout(hideLoader, 4000);

loadTeam();
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(e => console.log('SW error:', e));
  });
}
</script>
</body>
</html>
