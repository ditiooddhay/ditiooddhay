<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold:#c9a84c; --gold-light:#e8c96d;
    --dark:#0e0c0a; --dark2:#1a1714; --dark3:#211e18;
    --cream:#f5efe6; --text-muted:#9a8f7e;
  }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--dark);
    color: var(--cream);
    font-family: 'Hind Siliguri', sans-serif;
  }

  /* FULL SCREEN LAYOUT */
  .app {
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  /* BG */
  .app-bg {
    position: absolute; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(201,168,76,.1) 0%, transparent 55%),
      radial-gradient(ellipse at 70% 80%, rgba(201,168,76,.07) 0%, transparent 50%),
      linear-gradient(160deg, #0e0c0a 0%, #1a1410 50%, #0e0c0a 100%);
  }
  .ring {
    position: absolute; border-radius: 50%;
    border: 1px solid rgba(201,168,76,.06);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    animation: pulse 5s ease-in-out infinite;
    pointer-events: none;
  }
  .r1 { width: 500px; height: 500px; }
  .r2 { width: 700px; height: 700px; animation-delay: 1.5s; }
  @keyframes pulse { 0%,100%{opacity:.6;transform:translate(-50%,-50%) scale(1)} 50%{opacity:.3;transform:translate(-50%,-50%) scale(1.04)} }

  /* HEADER */
  .app-header { position:fixed; top:0; left:0; right:0; z-index:100; background:rgba(14,12,10,.96); backdrop-filter:blur(12px); border-bottom:1px solid rgba(201,168,76,.12); padding:.85rem 1.5rem; display:flex; align-items:center; flex-shrink:0; }
  .header-logo { width:38px; height:auto; filter:drop-shadow(0 0 8px rgba(201,168,76,.3)); flex-shrink:0; }
  .header-title { font-family:'Playfair Display',serif; font-size:1rem; color:var(--gold); letter-spacing:.5px; position:absolute; left:50%; transform:translateX(-50%); white-space:nowrap; }
  .header-badge { font-size:.65rem; letter-spacing:3px; text-transform:uppercase; color:var(--text-muted); border:1px solid rgba(201,168,76,.2); padding:3px 10px; margin-left:auto; flex-shrink:0; }

  /* CENTER HERO */
  .app-hero {
    position: relative; z-index: 10;
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 1rem;
    gap: .5rem;
  }

  .hero-logo {
    width: clamp(110px, 22vw, 160px);
    height: auto;
    filter: drop-shadow(0 0 28px rgba(201,168,76,.4));
    animation: fadeUp .8s ease both;
    margin-bottom: .3rem;
  }

  .divider { display:flex; align-items:center; gap:.8rem; width: 180px; animation: fadeUp .8s ease .15s both; }
  .dl { flex:1; height:1px; background:linear-gradient(90deg,transparent,var(--gold)); }
  .dr { background:linear-gradient(270deg,transparent,var(--gold)); }
  .dd { width:4px; height:4px; background:var(--gold); transform:rotate(45deg); flex-shrink:0; }

  .hero-tagline {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(.75rem, 2.5vw, .95rem);
    color: rgba(201,168,76,.7);
    text-align: center;
    animation: fadeUp .8s ease .25s both;
    letter-spacing: .5px;
  }

  /* NAV GRID */
  .app-nav {
    position: relative; z-index: 10;
    padding: .8rem 1rem 0;
    flex-shrink: 0;
  }

  .nav-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: .6rem;
    max-width: 480px;
    margin: 0 auto;
  }

  .nav-item {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: .35rem;
    padding: .9rem .5rem;
    background: rgba(255,255,255,.03);
    border: 1px solid rgba(201,168,76,.12);
    text-decoration: none;
    transition: all .25s ease;
    cursor: pointer;
    animation: fadeUp .6s ease both;
    position: relative;
    overflow: hidden;
  }
  .nav-item::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(201,168,76,.08), transparent);
    opacity: 0; transition: opacity .25s;
  }
  .nav-item:hover, .nav-item:active { border-color: rgba(201,168,76,.4); transform: translateY(-2px); }
  .nav-item:hover::before, .nav-item:active::before { opacity: 1; }

  .nav-icon { font-size: 1.4rem; line-height: 1; }
  .nav-label {
    font-size: .65rem; letter-spacing: 1px;
    text-transform: uppercase; color: var(--text-muted);
    text-align: center; line-height: 1.3;
    transition: color .25s;
  }
  .nav-item:hover .nav-label, .nav-item:active .nav-label { color: var(--gold); }

  .nav-item.primary { border-color: rgba(201,168,76,.3); background: rgba(201,168,76,.07); }
  .chat-live-dot { position:absolute; top:10px; right:10px; width:8px; height:8px; border-radius:50%; background:#5ed98a; box-shadow:0 0 0 0 rgba(94,217,138,.6); animation:chatPulse 2s infinite; }
  @keyframes chatPulse { 0%{box-shadow:0 0 0 0 rgba(94,217,138,.55)} 70%{box-shadow:0 0 0 7px rgba(94,217,138,0)} 100%{box-shadow:0 0 0 0 rgba(94,217,138,0)} }

  /* ── CHATBOT WIDGET ── */
  .chatbot-overlay { display:none; position:fixed; inset:0; z-index:600; background:rgba(0,0,0,.78); align-items:flex-end; justify-content:center; padding:0; }
  .chatbot-overlay.open { display:flex; animation:fadeIn .25s ease; }
  .chatbot-box { background:var(--dark2); border-top:1px solid rgba(201,168,76,.3); width:100%; max-width:460px; height:min(82vh,640px); display:flex; flex-direction:column; animation:chatSlideUp .35s ease; border-radius:14px 14px 0 0; overflow:hidden; }
  @media(min-width:560px){ .chatbot-overlay{ align-items:center; padding:1.5rem; } .chatbot-box{ border-radius:14px; border:1px solid rgba(201,168,76,.25); height:min(80vh,620px); } }
  @keyframes chatSlideUp { from{opacity:0; transform:translateY(40px)} to{opacity:1; transform:translateY(0)} }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }

  .chat-header { display:flex; align-items:center; gap:.7rem; padding:.9rem 1.1rem; background:linear-gradient(135deg, rgba(201,168,76,.12), rgba(201,168,76,.03)); border-bottom:1px solid rgba(201,168,76,.15); flex-shrink:0; }
  .chat-avatar { width:38px; height:38px; border-radius:50%; background:var(--dark3); border:1.5px solid var(--gold); display:flex; align-items:center; justify-content:center; font-size:1.1rem; flex-shrink:0; }
  .chat-header-info { flex:1; min-width:0; }
  .chat-header-name { font-family:'Playfair Display',serif; font-size:.95rem; color:var(--cream); }
  .chat-header-status { font-size:.68rem; color:#5ed98a; display:flex; align-items:center; gap:.3rem; }
  .chat-header-status::before { content:''; width:6px; height:6px; border-radius:50%; background:#5ed98a; }
  .chat-close { background:none; border:1px solid rgba(255,255,255,.12); color:var(--text-muted); width:30px; height:30px; border-radius:50%; cursor:pointer; font-size:.85rem; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all .2s; }
  .chat-close:hover { color:var(--gold); border-color:var(--gold); }

  .chat-body { flex:1; overflow-y:auto; padding:1.1rem; display:flex; flex-direction:column; gap:.7rem; }
  .chat-msg { max-width:82%; font-size:.86rem; line-height:1.6; padding:.6rem .9rem; animation:msgIn .25s ease; }
  @keyframes msgIn { from{opacity:0; transform:translateY(6px)} to{opacity:1; transform:translateY(0)} }
  .chat-msg.bot { align-self:flex-start; background:var(--dark3); color:var(--cream); border-radius:3px 14px 14px 14px; border:1px solid rgba(201,168,76,.12); }
  .chat-msg.user { align-self:flex-end; background:linear-gradient(135deg, var(--gold), var(--gold-light)); color:var(--dark); font-weight:500; border-radius:14px 3px 14px 14px; }
  .chat-typing { align-self:flex-start; display:flex; gap:4px; padding:.7rem .9rem; background:var(--dark3); border-radius:3px 14px 14px 14px; border:1px solid rgba(201,168,76,.12); }
  .chat-typing span { width:6px; height:6px; border-radius:50%; background:var(--text-muted); animation:typingDot 1.1s infinite ease-in-out; }
  .chat-typing span:nth-child(2){animation-delay:.15s} .chat-typing span:nth-child(3){animation-delay:.3s}
  @keyframes typingDot { 0%,60%,100%{transform:translateY(0); opacity:.4} 30%{transform:translateY(-4px); opacity:1} }

  .chat-quick-wrap { padding:0 1.1rem .9rem; display:flex; flex-wrap:wrap; gap:.5rem; flex-shrink:0; }
  .chat-quick-btn { background:rgba(201,168,76,.08); border:1px solid rgba(201,168,76,.3); color:var(--gold); font-size:.76rem; padding:.45rem .85rem; border-radius:20px; cursor:pointer; font-family:'Hind Siliguri',sans-serif; transition:all .2s; white-space:nowrap; }
  .chat-quick-btn:hover { background:rgba(201,168,76,.18); }

  .chat-input-row { display:flex; align-items:center; gap:.6rem; padding:.8rem 1rem; border-top:1px solid rgba(201,168,76,.12); flex-shrink:0; background:var(--dark2); }
  .chat-input { flex:1; background:rgba(255,255,255,.04); border:1px solid rgba(201,168,76,.2); color:var(--cream); padding:.65rem .9rem; border-radius:20px; font-family:'Hind Siliguri',sans-serif; font-size:.85rem; outline:none; }
  .chat-input:focus { border-color:var(--gold); }
  .chat-send-btn { background:linear-gradient(135deg, var(--gold), var(--gold-light)); border:none; color:var(--dark); width:38px; height:38px; border-radius:50%; cursor:pointer; font-size:1rem; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:transform .2s; }
  .chat-send-btn:hover { transform:scale(1.07); }
  .chat-wa-link { display:flex; align-items:center; justify-content:center; gap:.5rem; margin:0 1.1rem .9rem; padding:.55rem; background:rgba(94,217,138,.08); border:1px solid rgba(94,217,138,.3); color:#5ed98a; font-size:.78rem; text-decoration:none; border-radius:8px; flex-shrink:0; transition:all .2s; }
  .chat-wa-link:hover { background:rgba(94,217,138,.15); }
  .nav-item.primary .nav-label { color: var(--gold); }

  /* FOOTER */
  .app-footer {
    position: relative; z-index: 10;
    padding: .6rem 1.5rem;
    border-top: 1px solid rgba(201,168,76,.08);

  /* STAGGERED DELAYS */

    position: fixed; inset: 0; z-index: 9999;
    background: #0e0c0a;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 1.2rem;
    transition: opacity .5s ease, visibility .5s ease;
  }
  #pageLoader.hide { opacity: 0; visibility: hidden; }
  .loader-logo {
    width: 90px; height: auto;
    filter: drop-shadow(0 0 20px rgba(201,168,76,.4));
    animation: loaderPulse 1.5s ease-in-out infinite;
  }
  @keyframes loaderPulse {
    0%,100% { transform: scale(1); filter: drop-shadow(0 0 15px rgba(201,168,76,.3)); }
    50% { transform: scale(1.06); filter: drop-shadow(0 0 28px rgba(201,168,76,.6)); }
  }
  .loader-bar-wrap { width: 120px; height: 2px; background: rgba(201,168,76,.15); overflow: hidden; }
  .loader-bar { height: 100%; background: linear-gradient(90deg, transparent, #c9a84c, transparent); animation: loaderBar 1.2s ease-in-out infinite; width: 60%; }
  @keyframes loaderBar { 0% { transform: translateX(-100%); } 100% { transform: translateX(280%); } }
  .loader-text { font-family: 'Hind Siliguri', sans-serif; font-size: .7rem; letter-spacing: 3px; text-transform: uppercase; color: rgba(201,168,76,.5); }

</style>

  payment: 'পেমেন্ট করা যায় <strong>বিকাশ ও নগদে</strong> — নম্বর: 01774-284200। বুকিং করার সময় ন্যূনতম ২০% অগ্রিম দিতে হয়, বাকিটা ইভেন্টের দিন।',
  greeting: 'আস-সালামু আলাইকুম! 🌸 দ্বিতীয় অধ্যায়ে স্বাগতম। আমি কীভাবে সাহায্য করতে পারি?',
  thanks: 'আপনাকেও ধন্যবাদ! 🙏 আরও কিছু জানতে চান?',
  fallback: 'এই প্রশ্নের নির্দিষ্ট উত্তর আমার কাছে নেই। উপরের অপশনগুলো ট্রাই করুন, অথবা নিচের বাটনে চাপ দিয়ে সরাসরি WhatsApp এ আমাদের সাথে যোগাযোগ করুন — আমরা যত দ্রুত সম্ভব উত্তর দেব।'
};

const CHAT_KEYWORDS = {
  packages: ['প্যাকেজ','মূল্য','দাম','রেট','price','package','cost','কত টাকা'],
  booking: ['বুকিং','বুক করতে','বুক করব','booking','book'],
  schedule: ['শিডিউল','ফাঁকা','availability','schedule','available','উপলব্ধ'],
  contact: ['ঠিকানা','যোগাযোগ','নম্বর','ফোন','address','contact','phone','location','কোথায়'],
  payment: ['পেমেন্ট','বিকাশ','নগদ','অগ্রিম','advance','payment','bkash','nagad','টাকা দিব'],
  greeting: ['সালাম','হ্যালো','হাই','hello','hi','assalamu','আসসালামু'],
  thanks: ['ধন্যবাদ','thanks','thank you'],
};

function findBestFaqMatch(text) {
  const t = text.toLowerCase();
  let best = null, bestScore = 0;
  for (const faq of trainedFaqs) {
    let score = 0;
    for (const w of faq.words) {
      if (w && t.includes(w)) score += w.split(/\s+/).filter(Boolean).length; // longer/specific phrases score higher
    }
    if (score > bestScore) { bestScore = score; best = faq; }
  }
  return bestScore > 0 ? best : null;
}

function respondTo(text) {
  const t = text.toLowerCase();
  const faqMatch = findBestFaqMatch(text);
  if (faqMatch) { botReplyWithFollowups(faqMatch.answer, faqMatch.suggested, 650); return; }
  for (const [key, words] of Object.entries(CHAT_KEYWORDS)) {
    if (words.some(w => t.includes(w.toLowerCase()))) { botReply(CHAT_ANSWERS[key], 650); return; }
  }
  botReply(CHAT_ANSWERS.fallback, 650);
}

function updateWaLink(context) {
  const msg = context
    ? `আস-সালামু আলাইকুম! আমি আপনার ওয়েবসাইটের লাইভ চ্যাটে "${context}" নিয়ে জিজ্ঞাসা করেছিলাম, একটু বিস্তারিত জানতে চাই।`
    : 'আস-সালামু আলাইকুম! আমি আপনার ওয়েবসাইট থেকে এসেছি, কিছু জানতে চাই।';
  document.getElementById('chatWaLink').href = `https://wa.me/${WA_PHONE}?text=${encodeURIComponent(msg)}`;
}

function addMsg(text, who) {
  const body = document.getElementById('chatBody');
  const div = document.createElement('div');
  div.className = 'chat-msg ' + who;
  div.innerHTML = text;
  body.appendChild(div);
  body.scrollTop = body.scrollHeight;
}

function showTyping() {
  const body = document.getElementById('chatBody');
  const div = document.createElement('div');
  div.className = 'chat-typing';
  div.id = 'typingIndicator';
  div.innerHTML = '<span></span><span></span><span></span>';
  body.appendChild(div);
  body.scrollTop = body.scrollHeight;
}
function hideTyping() {
  const t = document.getElementById('typingIndicator');
  if (t) t.remove();
}

function botReply(text, delay) {
  showTyping();
  setTimeout(() => {
    hideTyping();
    addMsg(text, 'bot');
  }, delay || 600);
}

function botReplyWithFollowups(text, suggested, delay) {
  showTyping();
  setTimeout(() => {
    hideTyping();
    addMsg(text, 'bot');
    if (suggested && suggested.length) {
      const body = document.getElementById('chatBody');
      const wrap = document.createElement('div');
      wrap.style.cssText = 'display:flex;flex-wrap:wrap;gap:.4rem;align-self:flex-start;max-width:90%';
      wrap.innerHTML = suggested.map(q =>
        `<button class="chat-quick-btn" style="font-size:.72rem;padding:.35rem .7rem" onclick="handleFollowup('${q.replace(/'/g, "&#39;")}')">${q}</button>`
      ).join('');
      body.appendChild(wrap);
      body.scrollTop = body.scrollHeight;
    }
  }, delay || 600);
}

function handleFollowup(question) {
  addMsg(question, 'user');
  updateWaLink(question);
  respondTo(question);
}

function renderQuickReplies() {
  const wrap = document.getElementById('chatQuickWrap');
  wrap.innerHTML = CHAT_QUICK_REPLIES.map(q =>
    `<button class="chat-quick-btn" onclick="handleQuickReply('${q.key}')">${q.label}</button>`
  ).join('');
}

function handleQuickReply(key) {
  const found = CHAT_QUICK_REPLIES.find(q => q.key === key);
  addMsg(found.label, 'user');
  updateWaLink(found.label.replace(/^\S+\s/, ''));
  botReply(CHAT_ANSWERS[key], 550);
}

function sendChatMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  addMsg(text, 'user');
  updateWaLink(text);
  input.value = '';
  respondTo(text);
}

function openChatBot() {
  document.getElementById('chatbotOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  updateWaLink();
  if (!chatOpened) {
    chatOpened = true;
    loadTrainedFaqs();
    renderQuickReplies();
    setTimeout(() => addMsg(CHAT_ANSWERS.greeting, 'bot'), 300);
  }
}
function closeChatBot() {
  document.getElementById('chatbotOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
function closeChatBotOnOverlay(e) {
  if (e.target.id === 'chatbotOverlay') closeChatBot();
}
</script>
