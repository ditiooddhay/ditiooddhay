<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#c9a84c;--gold-light:#e8c96d;--dark:#0e0c0a;--dark2:#1a1714;--dark3:#211e18;--cream:#f5efe6;--text-muted:#9a8f7e;--red:#e05555;--green:#4caf7d}
body{background:var(--dark);color:var(--cream);font-family:'Hind Siliguri',sans-serif;min-height:100vh}

/* LOGIN */
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem;background:radial-gradient(ellipse at 50% 30%,rgba(201,168,76,.1) 0%,transparent 70%)}
.login-box{background:var(--dark2);border:1px solid rgba(201,168,76,.2);padding:2.5rem 2rem;width:100%;max-width:360px;text-align:center}
.login-title{font-family:'Playfair Display',serif;font-size:1.6rem;color:var(--gold);margin-bottom:.3rem}
.login-sub{color:var(--text-muted);font-size:.82rem;margin-bottom:1.5rem}
.login-input{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(201,168,76,.2);color:var(--cream);padding:.85rem 1rem;font-family:'Hind Siliguri',sans-serif;font-size:1rem;outline:none;margin-bottom:1rem}
.login-input:focus{border-color:var(--gold)}
.login-btn{width:100%;background:linear-gradient(135deg,var(--gold),var(--gold-light));color:var(--dark);border:none;padding:.9rem;font-family:'Hind Siliguri',sans-serif;font-size:1rem;font-weight:700;cursor:pointer}
.login-err{color:var(--red);font-size:.8rem;margin-top:.5rem;display:none}

/* MAIN */
.main-screen{display:none}
nav{position:sticky;top:0;z-index:100;background:rgba(14,12,10,.97);border-bottom:1px solid rgba(201,168,76,.15);padding:.8rem 1.5rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
.nav-logo{width:36px;height:auto;filter:drop-shadow(0 0 6px rgba(201,168,76,.3))}
.nav-title{font-family:'Playfair Display',serif;color:var(--gold);font-size:1rem;position:absolute;left:50%;transform:translateX(-50%);white-space:nowrap}
.nav-actions{margin-left:auto;display:flex;gap:.5rem;flex-wrap:wrap}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-light));color:var(--dark);border:none;padding:.55rem 1.2rem;font-family:'Hind Siliguri',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;transition:all .3s}
.btn-outline{background:none;border:1px solid rgba(201,168,76,.3);color:var(--gold);padding:.5rem 1rem;font-family:'Hind Siliguri',sans-serif;font-size:.8rem;cursor:pointer;transition:all .25s;text-decoration:none;display:inline-flex;align-items:center}
.btn-outline:hover{background:rgba(201,168,76,.08)}
.btn-red{background:none;border:1px solid rgba(220,80,80,.3);color:#e07070;padding:.5rem 1rem;font-family:'Hind Siliguri',sans-serif;font-size:.8rem;cursor:pointer}

/* PANELS */
.panel{max-width:1000px;margin:0 auto;padding:1.5rem}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:1rem;margin-bottom:2rem}
.stat-card{background:var(--dark2);border:1px solid rgba(201,168,76,.15);padding:1.2rem;text-align:center}
.stat-num{font-family:'Playfair Display',serif;font-size:1.8rem;color:var(--gold)}
.stat-label{font-size:.68rem;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);margin-top:.3rem}

/* FORM */
.form-card{background:var(--dark2);border:1px solid rgba(201,168,76,.15);padding:1.8rem;margin-bottom:1.5rem}
.form-section{font-size:.67rem;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:1.2rem;padding-bottom:.5rem;border-bottom:1px solid rgba(201,168,76,.1)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
@media(max-width:600px){.form-grid{grid-template-columns:1fr}}
.form-group{display:flex;flex-direction:column;gap:.35rem}
.form-group.full{grid-column:1/-1}
.form-label{font-size:.67rem;letter-spacing:2px;text-transform:uppercase;color:var(--gold)}
.form-input,.form-select,.form-textarea{background:rgba(255,255,255,.04);border:1px solid rgba(201,168,76,.2);color:var(--cream);padding:.75rem 1rem;font-family:'Hind Siliguri',sans-serif;font-size:.92rem;outline:none;transition:border .3s;-webkit-appearance:none}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--gold);background:rgba(201,168,76,.04)}
.form-input::placeholder{color:rgba(154,143,126,.4)}
.form-select option{background:var(--dark2)}

/* BOOKING LIST */
.booking-list{display:flex;flex-direction:column;gap:.8rem}
.booking-card{background:var(--dark2);border:1px solid rgba(201,168,76,.12);padding:1.2rem 1.4rem;cursor:pointer;transition:all .3s}
.booking-card:hover{border-color:rgba(201,168,76,.4);transform:translateX(3px)}
.booking-card-top{display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.booking-name{font-family:'Playfair Display',serif;font-size:1rem;color:var(--cream)}
.booking-date{font-size:.78rem;color:var(--text-muted)}
.booking-meta{font-size:.75rem;color:var(--text-muted);margin-top:.3rem}
.due-badge{font-size:.65rem;letter-spacing:2px;text-transform:uppercase;padding:3px 10px;border:1px solid}
.due-ok{color:var(--green);border-color:rgba(76,175,125,.4);background:rgba(76,175,125,.08)}
.due-pending{color:var(--gold);border-color:rgba(201,168,76,.4);background:rgba(201,168,76,.08)}
.due-overdue{color:var(--red);border-color:rgba(224,85,85,.4);background:rgba(224,85,85,.08)}

/* DETAIL VIEW */
.detail-view{display:none;position:fixed;inset:0;z-index:200;background:var(--dark);overflow-y:auto}
.detail-view.open{display:block;animation:fadeIn .3s ease}
.detail-header{position:sticky;top:0;z-index:10;background:rgba(14,12,10,.97);border-bottom:1px solid rgba(201,168,76,.15);padding:1rem 1.5rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
.detail-title{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--cream)}
.detail-body{max-width:900px;margin:0 auto;padding:1.5rem}

/* INFO BOX */
.info-box{background:var(--dark2);border:1px solid rgba(201,168,76,.15);padding:1.4rem;margin-bottom:1.2rem}
.info-box-title{font-size:.67rem;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:1rem;padding-bottom:.5rem;border-bottom:1px solid rgba(201,168,76,.1)}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:.5rem 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:.88rem}
.info-row:last-child{border-bottom:none}
.info-label{color:var(--text-muted)}
.info-value{color:var(--cream);font-weight:500;text-align:right}
.info-value.gold{color:var(--gold);font-family:'Playfair Display',serif;font-size:1rem}
.info-value.red{color:var(--red);font-family:'Playfair Display',serif;font-size:1rem}
.info-value.green{color:var(--green);font-family:'Playfair Display',serif;font-size:1rem}

/* PAYMENT LOG */
.pay-log{display:flex;flex-direction:column;gap:.5rem;margin-bottom:1rem}
.pay-item{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);padding:.6rem .9rem;font-size:.82rem;flex-wrap:wrap;gap:.4rem}
.pay-item-left{color:var(--cream)}
.pay-item-date{font-size:.7rem;color:var(--text-muted)}
.pay-item-amt{color:var(--green);font-weight:600;white-space:nowrap}
.pay-remove{background:none;border:none;color:rgba(220,80,80,.6);cursor:pointer;font-size:.75rem;padding:.2rem .4rem}

/* TEAM ASSIGN */
.team-chips{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.8rem}
.team-chip{display:flex;align-items:center;gap:.4rem;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.3);padding:.3rem .7rem;font-size:.78rem;color:var(--cream)}
.team-chip button{background:none;border:none;color:var(--red);cursor:pointer;font-size:.75rem;line-height:1}

/* PAYMENT DIST */
.pay-dist-row{display:grid;grid-template-columns:1fr 1fr auto;gap:.5rem;align-items:center;margin-bottom:.5rem}
.pay-dist-name{font-size:.85rem;color:var(--cream);padding:.5rem .8rem;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06)}

/* STATEMENT PREVIEW */
#statementPreview{display:none;background:#fff;color:#1a1209;font-family:'Hind Siliguri',sans-serif;width:794px;padding:48px 52px;position:absolute;left:-9999px}
.st-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;padding-bottom:16px;border-bottom:2px solid #c9a84c}
.st-logo{width:60px;height:auto}
.st-brand{font-family:'Playfair Display',serif;font-size:18px;color:#c9a84c;font-weight:700}
.st-addr{font-size:10px;color:#666;margin-top:3px;line-height:1.5}
.st-title{font-family:'Playfair Display',serif;font-size:22px;color:#1a1209;text-align:center;margin-bottom:20px}
.st-table{width:100%;border-collapse:collapse;margin-bottom:16px}
.st-table th{background:#c9a84c;color:#fff;padding:8px 12px;font-size:10px;letter-spacing:2px;text-transform:uppercase;text-align:left}
.st-table td{padding:8px 12px;border-bottom:1px solid #f0e8d8;font-size:11px;color:#333}
.st-table tr:nth-child(even) td{background:#faf7f2}
.st-total{display:flex;justify-content:flex-end;margin-top:12px}
.st-total-box{width:240px;border:1px solid #e8d9b8}
.st-total-row{display:flex;justify-content:space-between;padding:6px 12px;font-size:11px;border-bottom:1px solid #f0e8d8}
.st-total-row.final{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:#c9a84c;border:none}

/* TOAST */
.toast{position:fixed;bottom:2rem;right:2rem;background:var(--dark2);border:1px solid rgba(201,168,76,.3);padding:1rem 1.5rem;color:var(--cream);font-size:.88rem;transform:translateY(100px);opacity:0;transition:all .4s;z-index:999;max-width:300px}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{border-color:rgba(85,176,85,.5)}
.toast.error{border-color:rgba(220,80,80,.5)}

/* LOADING */
.loading{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;align-items:center;justify-content:center;flex-direction:column;gap:1rem}
.loading.show{display:flex}
.spinner{width:32px;height:32px;border:3px solid rgba(201,168,76,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
.loading-text{color:var(--gold);font-size:.88rem}

/* MONTH FILTER */
.filter-row{display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:1.5rem;align-items:center}
.filter-label{font-size:.72rem;color:var(--text-muted);letter-spacing:1px}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="loading" id="loading"><div class="spinner"></div><div class="loading-text" id="loadingText">সেভ হচ্ছে...</div></div>
<div class="toast" id="toast"></div>
<div id="statementPreview"></div>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-title">দ্বিতীয় অধ্যায়</div>
    <div class="login-sub">শিডিউল ডিটেইলস</div>
    <input type="password" class="login-input" id="passInput" placeholder="পাসওয়ার্ড" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">প্রবেশ করুন</button>
    <div class="login-err" id="loginErr">পাসওয়ার্ড ভুল!</div>
  </div>
</div>

<!-- ADD/EDIT FORM -->
<div class="detail-view" id="addFormView">
  <div class="detail-header">
    <button class="btn-outline" onclick="closeAddForm()">&#8592; ফিরে যান</button>
    <span class="detail-title" id="formTitle">নতুন এন্ট্রি</span>
    <div style="margin-left:auto;display:flex;gap:.5rem">
      <button class="btn-gold" onclick="saveEntry()">&#10003; সেভ করুন</button>
    </div>
  </div>
  <div class="detail-body">
    <input type="hidden" id="editId">

    <div class="form-card">
      <div class="form-section">ক্লায়েন্ট তথ্য</div>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">ক্লায়েন্টের নাম *</label>
          <input type="text" class="form-input" id="fName" placeholder="নাম লিখুন">
        </div>
        <div class="form-group">
          <label class="form-label">ঠিকানা</label>
          <input type="text" class="form-input" id="fAddress" placeholder="গ্রাম/উপজেলা">
        </div>
        <div class="form-group full">
          <label class="form-label">ইভেন্ট তারিখ * (একাধিক তারিখ যোগ করতে পারবেন)</label>
          <div id="eventDatesWrap">
            <div class="date-row" style="display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem">
              <input type="date" class="form-input" style="flex:1">
              <span style="font-size:.72rem;color:var(--text-muted);white-space:nowrap;min-width:2.5rem">দিন ১</span>
            </div>
          </div>
          <button type="button" onclick="addEventDate()" style="background:none;border:1px solid rgba(201,168,76,.25);color:var(--text-muted);padding:.4rem 1rem;font-family:'Hind Siliguri',sans-serif;font-size:.78rem;cursor:pointer;margin-top:.3rem;transition:all .25s">+ আরেকটি দিন যোগ করুন</button>
        </div>
        <div class="form-group">
          <label class="form-label">প্যাকেজ</label>
          <input type="text" class="form-input" id="fPackage" placeholder="যেমন: PC3 — চীফ কম্বো">
        </div>
        <div class="form-group">
          <label class="form-label">মোট টাকা (৳)</label>
          <input type="number" class="form-input" id="fTotal" placeholder="০" oninput="calcDue()">
        </div>
        <div class="form-group">
          <label class="form-label">নোট</label>
          <input type="text" class="form-input" id="fNotes" placeholder="বিশেষ তথ্য...">
        </div>
      </div>
    </div>

    <div class="form-card">
      <div class="form-section">পেমেন্ট লগ</div>
      <div class="pay-log" id="payLogList"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr auto;gap:.6rem;align-items:end">
        <div class="form-group">
          <label class="form-label">পেমেন্ট পরিমাণ (৳)</label>
          <input type="number" class="form-input" id="newPayAmt" placeholder="০">
        </div>
        <div class="form-group">
          <label class="form-label">তারিখ</label>

async function loadTeamMembers() {
  const { data: founder } = await sb.from('team_founder').select('name,role').limit(1);

// ── FILL FILTERS ──
function fillFilters() {
  const mSel = document.getElementById('filterMonth');

// ── LOAD ──
async function loadBookings() {
  try {
    const { data, error } = await sb.from('schedule_details').select('*').order('created_at', {ascending:false});
    if (error) throw error;
    allBookings = data || [];
    renderList();
    renderStats();
  } catch(e) {
    console.error('Load error:', e);
    document.getElementById('bookingList').innerHTML = '<div style="text-align:center;padding:3rem;color:var(--text-muted)">লোড হয়নি। <button onclick="loadBookings()" style="background:none;border:none;color:var(--gold);cursor:pointer;text-decoration:underline;font-family:Hind Siliguri,sans-serif">আবার চেষ্টা করুন</button></div>';
    showToast('লোড হয়নি: ' + e.message, 'error');
  }
}

function renderStats() {
  const total = allBookings.length;
  const totalIncome = allBookings.reduce((s,b) => s + (b.total_amount||0), 0);
  const totalPaid = allBookings.reduce((s,b) => {
    const pays = b.payments || [];
    return s + pays.reduce((a,p) => a + (p.amount||0), 0);
  }, 0);
  const totalDue = allBookings.reduce((s,b) => s + (b.due_amount||0), 0);
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">মোট বুকিং</div></div>
    <div class="stat-card"><div class="stat-num" style="font-size:1.3rem">৳ ${totalIncome.toLocaleString()}</div><div class="stat-label">মোট আয়</div></div>
    <div class="stat-card"><div class="stat-num" style="font-size:1.3rem;color:var(--green)">৳ ${totalPaid.toLocaleString()}</div><div class="stat-label">মোট পেমেন্ট</div></div>
    <div class="stat-card"><div class="stat-num" style="font-size:1.3rem;color:var(--red)">৳ ${totalDue.toLocaleString()}</div><div class="stat-label">মোট বাকি</div></div>
  `;
}

function renderList() {
  const month = document.getElementById('filterMonth').value;
  const year = document.getElementById('filterYear').value;
  const status = document.getElementById('filterStatus').value;

  let filtered = allBookings.filter(b => {
    if (month && b.event_date) {
      const fd = b.event_date.split(',')[0].trim();
      const m = new Date(fd + 'T00:00:00').getMonth() + 1;
      if (m != month) return false;
    }
    if (year && b.event_date) {
      const fd = b.event_date.split(',')[0].trim();
      const y = new Date(fd + 'T00:00:00').getFullYear();
      if (y != year) return false;
    }
    if (status === 'due' && !(b.due_amount > 0)) return false;
    if (status === 'paid' && b.due_amount > 0) return false;
    return true;
  });

  const list = document.getElementById('bookingList');
  if (!filtered.length) {
    list.innerHTML = '<div style="text-align:center;padding:3rem;color:var(--text-muted)">কোনো এন্ট্রি নেই</div>';
    return;
  }

  list.innerHTML = filtered.map(b => {
    const due = b.due_amount || 0;
    const badgeCls = due <= 0 ? 'due-ok' : 'due-pending';
    const badgeText = due <= 0 ? 'পরিশোধিত' : `বাকি ৳ ${due.toLocaleString()}`;
    const dateStr = b.event_date ? new Date(b.event_date).toLocaleDateString('bn-BD') : '—';
    const team = (b.assigned_team || []).map(t => t.name || t).join(', ');
    return `<div class="booking-card" onclick="openDetail(${b.id})">
      <div class="booking-card-top">
        <div>
          <div class="booking-name">${b.client_name || '—'}</div>
          <div class="booking-date">&#128197; ${allDates.length > 1 ? allDates.join(' • ') : dateStr} · ${b.package || '—'}</div>
          ${team ? `<div class="booking-meta">&#128101; ${team}</div>` : ''}
        </div>
        <div style="text-align:right">
          <span class="due-badge ${badgeCls}">${badgeText}</span>
          <div style="font-size:.75rem;color:var(--text-muted);margin-top:.3rem">মোট ৳ ${(b.total_amount||0).toLocaleString()}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── ADD FORM ──
function showAddForm() {
  document.getElementById('editId').value = '';
  document.getElementById('formTitle').textContent = 'নতুন এন্ট্রি';
  document.getElementById('fName').value = '';
  document.getElementById('fAddress').value = '';
  setEventDatesValue('');
  document.getElementById('fPackage').value = '';
  document.getElementById('fTotal').value = '';
  document.getElementById('fNotes').value = '';
  tempPayments = [];
  tempTeam = [];
  tempPayDist = {};
  renderPayLog();
  renderTeamChips();
  renderPayDist();
  calcDue();
  document.getElementById('addFormView').classList.add('open');
}

function closeAddForm() {
  document.getElementById('addFormView').classList.remove('open');
}

// ── PAYMENT ──
function addPayment() {
  const amt = parseFloat(document.getElementById('newPayAmt').value);
  const date = document.getElementById('newPayDate').value;
  if (!amt || amt <= 0) { showToast('পরিমাণ দিন!', 'error'); return; }
  tempPayments.push({amount: amt, date: date, id: Date.now()});
  document.getElementById('newPayAmt').value = '';
  renderPayLog();
  calcDue();
  renderPayDist();
}

function removePayment(id) {
  tempPayments = tempPayments.filter(p => p.id !== id);
  renderPayLog();
  calcDue();
}

function renderPayLog() {
  const list = document.getElementById('payLogList');
  if (!tempPayments.length) {
    list.innerHTML = '<div style="font-size:.8rem;color:var(--text-muted);padding:.5rem 0">কোনো পেমেন্ট নেই</div>';
    return;
  }
  list.innerHTML = tempPayments.map(p => `
    <div class="pay-item">
      <div>
        <div class="pay-item-left">৳ ${p.amount.toLocaleString()}</div>
        <div class="pay-item-date">${p.date}</div>
      </div>
      <div style="display:flex;align-items:center;gap:.5rem">
        <span class="pay-item-amt">+৳ ${p.amount.toLocaleString()}</span>
        <button class="pay-remove" onclick="removePayment(${p.id})">✕</button>
      </div>
    </div>
  `).join('');
}

function calcDue() {
  const total = parseFloat(document.getElementById('fTotal').value) || 0;
  const paid = tempPayments.reduce((s,p) => s + p.amount, 0);
  const due = Math.max(0, total - paid);
  document.getElementById('totalPaid').textContent = '৳ ' + paid.toLocaleString();
  document.getElementById('dueAmount').textContent = '৳ ' + due.toLocaleString();
  calcOffice();
}

// ── TEAM ──
function addTeamMember() {
  const sel = document.getElementById('teamSelect');
  const name = sel.value;
  if (!name) return;
  if (tempTeam.some(t => (t.name||t) === name)) { showToast('ইতিমধ্যে যোগ করা হয়েছে', 'error'); return; }
  const member = teamMembers.find(m => m.name === name);
  tempTeam.push({name, role: member ? member.role : ''});
  renderTeamChips();
  renderPayDist();
  sel.value = '';
}

function removeTeamMember(name) {
  tempTeam = tempTeam.filter(t => (t.name||t) !== name);
  delete tempPayDist[name];
  renderTeamChips();
  renderPayDist();
}

function renderTeamChips() {
  const wrap = document.getElementById('assignedChips');
  if (!tempTeam.length) {
    wrap.innerHTML = '<div style="font-size:.78rem;color:var(--text-muted)">কেউ অ্যাসাইন করা হয়নি</div>';
    return;
  }
  wrap.innerHTML = tempTeam.map(t => {
    const name = t.name || t;
    const role = t.role || '';
    return `<div class="team-chip">
      <span>${name} ${role ? `<span style="opacity:.6;font-size:.72rem">(${role})</span>` : ''}</span>
      <button onclick="removeTeamMember('${name}')">✕</button>
    </div>`;
  }).join('');
}

function renderPayDist() {
  const list = document.getElementById('payDistList');
  const paid = tempPayments.reduce((s,p) => s + p.amount, 0);
  if (!tempTeam.length) {
    list.innerHTML = '<div style="font-size:.78rem;color:var(--text-muted)">আগে টিম মেম্বার অ্যাসাইন করুন</div>';
    calcOffice();
    return;
  }
  list.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.4rem;margin-bottom:.5rem">
      <div style="font-size:.65rem;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted)">মেম্বার</div>
      <div style="font-size:.65rem;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted)">পরিমাণ (৳)</div>
    </div>
    ${tempTeam.map(t => {
      const name = t.name || t;
      const val = tempPayDist[name] || '';
      return `<div class="pay-dist-row">
        <div class="pay-dist-name">${name}</div>
        <input type="number" class="form-input" placeholder="০" value="${val}" 
          oninput="tempPayDist['${name}']=parseFloat(this.value)||0;calcOffice()" style="padding:.5rem .8rem">
      </div>`;
    }).join('')}
  `;
  calcOffice();
}

function applyOfficePct() {
  const pct = parseFloat(document.getElementById('officePct').value) || 0;
  const paid = tempPayments.reduce((s,p) => s + p.amount, 0);
  const officeAmt = Math.round(paid * pct / 100);
  const remaining = paid - officeAmt;
  // Distribute remaining equally among team members
  if (tempTeam.length > 0) {
    const perPerson = Math.round(remaining / tempTeam.length);
    tempTeam.forEach(t => {
      const name = t.name || t;
      tempPayDist[name] = perPerson;
    });
    renderPayDist();
  }
  calcOffice();
}

function calcOffice() {
  const paid = tempPayments.reduce((s,p) => s + p.amount, 0);
  const distTotal = Object.values(tempPayDist).reduce((s,v) => s + (v||0), 0);
  const office = Math.max(0, paid - distTotal);
  document.getElementById('officeAmount').textContent = '৳ ' + office.toLocaleString();
}

// ── EVENT DATES ──
let eventDateCount = 1;
function addEventDate() {
  eventDateCount++;
  const wrap = document.getElementById('eventDatesWrap');
  const row = document.createElement('div');
  row.style.cssText = 'display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem';
  row.innerHTML = `
    <input type="date" class="form-input" style="flex:1">
    <span style="font-size:.72rem;color:var(--text-muted);white-space:nowrap;min-width:2.5rem">দিন ${eventDateCount}</span>
    <button type="button" onclick="this.parentElement.remove();reNumberDates()" style="background:none;border:1px solid rgba(220,80,80,.3);color:#e07070;padding:.3rem .6rem;cursor:pointer;font-size:.75rem">✕</button>
  `;
  wrap.appendChild(row);
}
function reNumberDates() {
  document.querySelectorAll('#eventDatesWrap > div').forEach((row, i) => {
    const span = row.querySelector('span');
    if (span) span.textContent = `দিন ${i+1}`;
  });
  eventDateCount = document.querySelectorAll('#eventDatesWrap > div').length;
}
function getEventDatesValue() {
  return [...document.querySelectorAll('#eventDatesWrap input[type=date]')]
    .map(i => i.value).filter(Boolean).join(', ');
}
function setEventDatesValue(dateStr) {
  const wrap = document.getElementById('eventDatesWrap');
  wrap.innerHTML = '';
  eventDateCount = 0;
  const dates = dateStr ? dateStr.split(',').map(d => d.trim()).filter(Boolean) : [''];
  dates.forEach((d, i) => {
    eventDateCount = i + 1;
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem';
    row.innerHTML = `
      <input type="date" class="form-input" value="${d}" style="flex:1">
      <span style="font-size:.72rem;color:var(--text-muted);white-space:nowrap;min-width:2.5rem">দিন ${i+1}</span>
      ${i > 0 ? `<button type="button" onclick="this.parentElement.remove();reNumberDates()" style="background:none;border:1px solid rgba(220,80,80,.3);color:#e07070;padding:.3rem .6rem;cursor:pointer;font-size:.75rem">✕</button>` : ''}
    `;
    wrap.appendChild(row);
  });
}

// ── SAVE ──
async function saveEntry() {
  const name = document.getElementById('fName').value.trim();
  if (!name) { showToast('নাম দিন!', 'error'); return; }
  showLoading('সেভ হচ্ছে...');
  try {
    const total = parseFloat(document.getElementById('fTotal').value) || 0;
    const paid = tempPayments.reduce((s,p) => s + p.amount, 0);
    const due = Math.max(0, total - paid);
    const distTotal = Object.values(tempPayDist).reduce((s,v) => s + (v||0), 0);
    const office = Math.max(0, paid - distTotal);

    const payload = {
      client_name: name,
      address: document.getElementById('fAddress').value.trim(),
      event_date: getEventDatesValue(),
      package: document.getElementById('fPackage').value.trim(),
      total_amount: total,
      payments: tempPayments,
      due_amount: due,
      assigned_team: tempTeam,
      team_payments: Object.entries(tempPayDist).map(([name,amount]) => ({name,amount})),
      office_amount: office,
      notes: document.getElementById('fNotes').value.trim(),
      updated_at: new Date().toISOString()
    };

    const editId = document.getElementById('editId').value;
    if (editId) {
      await sb.from('schedule_details').update(payload).eq('id', editId);
    } else {
      payload.created_at = new Date().toISOString();
      await sb.from('schedule_details').insert(payload);
    }

    hideLoading();
    showToast('সেভ হয়েছে! ✓', 'success');
    closeAddForm();
    loadBookings();
  } catch(e) {
    hideLoading();
    showToast('সমস্যা: ' + e.message, 'error');
  }
}

  const teamPays = (b.team_payments || []);
  const dateStr = b.event_date ? new Date(b.event_date).toLocaleDateString('bn-BD') : '—';

  document.getElementById('detailBody').innerHTML = `
    <div class="info-box">
      <div class="info-box-title">ক্লায়েন্ট তথ্য</div>
      <div class="info-row"><span class="info-label">নাম</span><span class="info-value">${b.client_name||'—'}</span></div>
      <div class="info-row"><span class="info-label">ঠিকানা</span><span class="info-value">${b.address||'—'}</span></div>
      <div class="info-row"><span class="info-label">ইভেন্ট তারিখ</span><span class="info-value">${dateStr}</span></div>
      <div class="info-row"><span class="info-label">প্যাকেজ</span><span class="info-value">${b.package||'—'}</span></div>
      ${b.notes ? `<div class="info-row"><span class="info-label">নোট</span><span class="info-value">${b.notes}</span></div>` : ''}
    </div>
    <div class="info-box">
      <div class="info-box-title">পেমেন্ট সারসংক্ষেপ</div>
      <div class="info-row"><span class="info-label">মোট টাকা</span><span class="info-value gold">৳ ${(b.total_amount||0).toLocaleString()}</span></div>
      <div class="info-row"><span class="info-label">মোট পেমেন্ট</span><span class="info-value green">৳ ${totalPaid.toLocaleString()}</span></div>
      <div class="info-row"><span class="info-label">বাকি (Due)</span><span class="info-value ${(b.due_amount||0) > 0 ? 'red' : 'green'}">৳ ${(b.due_amount||0).toLocaleString()}</span></div>
      <div class="info-row"><span class="info-label">অফিসে রাখা</span><span class="info-value gold">৳ ${(b.office_amount||0).toLocaleString()}</span></div>
    </div>
    ${pays.length ? `
    <div class="info-box">
      <div class="info-box-title">পেমেন্ট লগ</div>
      ${pays.map(p => `<div class="info-row"><span class="info-label">${p.date||'—'}</span><span class="info-value green">+ ৳ ${(p.amount||0).toLocaleString()}</span></div>`).join('')}
    </div>` : ''}
    ${team ? `
    <div class="info-box">
      <div class="info-box-title">অ্যাসাইনড টিম</div>
      <div class="info-row"><span class="info-label">সদস্য</span><span class="info-value">${team}</span></div>
      ${teamPays.map(tp => `<div class="info-row"><span class="info-label">${tp.name}</span><span class="info-value gold">৳ ${(tp.amount||0).toLocaleString()}</span></div>`).join('')}
    </div>` : ''}
  `;
  document.getElementById('detailView').classList.add('open');
}

function closeDetail() {
  document.getElementById('detailView').classList.remove('open');
  currentEntry = null;
}

function editCurrent() {
  if (!currentEntry) return;
  const b = currentEntry;
  document.getElementById('editId').value = b.id;
  document.getElementById('formTitle').textContent = 'সম্পাদনা — ' + b.client_name;
  document.getElementById('fName').value = b.client_name || '';
  document.getElementById('fAddress').value = b.address || '';
  setEventDatesValue(b.event_date || '');
  document.getElementById('fPackage').value = b.package || '';
  document.getElementById('fTotal').value = b.total_amount || '';
  document.getElementById('fNotes').value = b.notes || '';
  tempPayments = (b.payments || []).map(p => ({...p, id: p.id || Date.now()}));
  tempTeam = b.assigned_team || [];
  tempPayDist = {};
  (b.team_payments || []).forEach(tp => { tempPayDist[tp.name] = tp.amount; });
  renderPayLog();
  renderTeamChips();
  renderPayDist();
  calcDue();
  closeDetail();
  document.getElementById('addFormView').classList.add('open');
}

async function deleteCurrent() {
  if (!currentEntry) return;
  if (!confirm('মুছে ফেলতে চান?')) return;
  await sb.from('schedule_details').delete().eq('id', currentEntry.id);
  closeDetail();
  loadBookings();
  showToast('মুছে ফেলা হয়েছে।');
}

// ── STATEMENT ──
function showStatement() {
  document.getElementById('statementView').classList.add('open');
}
function closeStatement() {
  document.getElementById('statementView').classList.remove('open');
}

document.getElementById('stType').addEventListener('change', function() {
  document.getElementById('stMember').style.display = this.value === 'member' ? 'block' : 'none';
});

async function generateStatement() {
  const type = document.getElementById('stType').value;
  const monthVal = document.getElementById('stMonth').value;
  const memberName = document.getElementById('stMember').value;
  const [yr, mn] = monthVal.split('-');

  let filtered = allBookings;
  if (type !== 'yearly') {
    filtered = allBookings.filter(b => {
      if (!b.event_date) return false;
      const d = new Date(b.event_date);
      return d.getFullYear() == yr && (type === 'yearly' || d.getMonth()+1 == mn);
    });
  } else {
    filtered = allBookings.filter(b => {
      if (!b.event_date) return false;
      return new Date(b.event_date).getFullYear() == yr;
    });
  }

  if (type === 'member' && memberName) {
    filtered = filtered.filter(b => (b.assigned_team||[]).some(t => (t.name||t) === memberName));
  }

  const totalIncome = filtered.reduce((s,b) => s + (b.total_amount||0), 0);
  const totalPaid = filtered.reduce((s,b) => s + (b.payments||[]).reduce((a,p) => a+(p.amount||0),0), 0);
  const totalDue = filtered.reduce((s,b) => s + (b.due_amount||0), 0);
  let memberTotal = 0;
  if (type === 'member' && memberName) {
    memberTotal = filtered.reduce((s,b) => {
      const tp = (b.team_payments||[]).find(t => t.name === memberName);
      return s + (tp ? tp.amount : 0);
    }, 0);
  }

  const title = type === 'member' ? `${memberName} — স্টেটমেন্ট (${BN_MONTHS[mn-1]} ${yr})` :
    type === 'yearly' ? `বার্ষিক স্টেটমেন্ট — ${yr}` :
    `মাসিক স্টেটমেন্ট — ${BN_MONTHS[mn-1]} ${yr}`;

  document.getElementById('statementBody').innerHTML = `
    <div style="background:var(--dark2);border:1px solid rgba(201,168,76,.15);padding:1.5rem;margin-bottom:1rem">
      <div style="font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--gold);margin-bottom:1rem">${title}</div>
      <div class="stats-grid" style="margin-bottom:0">
        <div class="stat-card"><div class="stat-num">${filtered.length}</div><div class="stat-label">বুকিং</div></div>
        <div class="stat-card"><div class="stat-num" style="font-size:1.2rem">৳ ${totalIncome.toLocaleString()}</div><div class="stat-label">মোট আয়</div></div>
        <div class="stat-card"><div class="stat-num" style="font-size:1.2rem;color:var(--green)">৳ ${totalPaid.toLocaleString()}</div><div class="stat-label">পেমেন্ট</div></div>
        <div class="stat-card"><div class="stat-num" style="font-size:1.2rem;color:var(--red)">৳ ${totalDue.toLocaleString()}</div><div class="stat-label">বাকি</div></div>
        ${type==='member'?`<div class="stat-card"><div class="stat-num" style="font-size:1.2rem;color:var(--gold)">৳ ${memberTotal.toLocaleString()}</div><div class="stat-label">${memberName}</div></div>`:''}
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:.5rem" id="stList">
      ${filtered.map(b => {
        const pays = (b.payments||[]).reduce((s,p)=>s+(p.amount||0),0);
        const memberPay = type==='member'&&memberName ? ((b.team_payments||[]).find(t=>t.name===memberName)||{}).amount||0 : null;
        return `<div style="background:var(--dark2);border:1px solid rgba(201,168,76,.1);padding:1rem 1.2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem">
          <div>
            <div style="font-family:'Playfair Display',serif;font-size:.92rem;color:var(--cream)">${b.client_name}</div>
            <div style="font-size:.75rem;color:var(--text-muted)">${b.event_date||'—'} · ${b.package||'—'}</div>
          </div>
          <div style="text-align:right">
            <div style="color:var(--gold);font-size:.88rem">৳ ${(b.total_amount||0).toLocaleString()}</div>
            ${memberPay!==null?`<div style="color:var(--green);font-size:.82rem">${memberName}: ৳ ${memberPay.toLocaleString()}</div>`:''}
            ${b.due_amount>0?`<div style="color:var(--red);font-size:.78rem">বাকি: ৳ ${b.due_amount.toLocaleString()}</div>`:'<div style="color:var(--green);font-size:.78rem">পরিশোধিত</div>'}
          </div>
        </div>`;
      }).join('')}
    </div>
  `;
}

async function downloadStatementFile(type) {
  const body = document.getElementById('statementBody');
  if (!body.innerHTML) { showToast('আগে স্টেটমেন্ট তৈরি করুন!', 'error'); return; }
  showLoading(type.toUpperCase() + ' তৈরি হচ্ছে...');
  try {
    const canvas = await html2canvas(body, {scale:2, backgroundColor:'#0e0c0a'});
    if (type === 'jpg') {
      const link = document.createElement('a');
      link.download = `statement-${Date.now()}.jpg`;
      link.href = canvas.toDataURL('image/jpeg', 0.95);
      link.click();
    } else {
      const {jsPDF} = window.jspdf;
      const pdf = new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
      const w = pdf.internal.pageSize.getWidth();
      const h = (canvas.height * w) / canvas.width;
      pdf.addImage(canvas.toDataURL('image/jpeg',0.95),'JPEG',0,0,w,h);
      pdf.save(`statement-${Date.now()}.pdf`);
    }
  } catch(e) { showToast('সমস্যা হয়েছে', 'error'); }
  hideLoading();
}

async function downloadStatement(type) {
  if (!currentEntry) return;
  const body = document.getElementById('detailBody');
  showLoading(type.toUpperCase() + ' তৈরি হচ্ছে...');
  try {
    const canvas = await html2canvas(body, {scale:2, backgroundColor:'#0e0c0a'});
    if (type === 'jpg') {
      const link = document.createElement('a');
      link.download = `${currentEntry.client_name}-statement.jpg`;
      link.href = canvas.toDataURL('image/jpeg', 0.95);
      link.click();
    } else {
      const {jsPDF} = window.jspdf;
      const pdf = new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
      const w = pdf.internal.pageSize.getWidth();
      const h = (canvas.height * w) / canvas.width;
      pdf.addImage(canvas.toDataURL('image/jpeg',0.95),'JPEG',0,0,w,h);
      pdf.save(`${currentEntry.client_name}-statement.pdf`);
    }
  } catch(e) { showToast('সমস্যা', 'error'); }
  hideLoading();
}

// ── UI ──
function showLoading(t) { document.getElementById('loadingText').textContent=t; document.getElementById('loading').classList.add('show'); }
function hideLoading() { document.getElementById('loading').classList.remove('show'); }
function showToast(msg, type='') { const t=document.getElementById('toast'); t.textContent=msg; t.className='toast show '+type; setTimeout(()=>t.className='toast',3500); }
</script>
